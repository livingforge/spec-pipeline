# 標準文書カタログの正本 — ここから dist の documents/*.yaml が生成される。
# 工程順: 要件定義書 → 基本設計書 → 詳細設計書 → テスト仕様書 → テスト結果報告書
#         → 要件・設計対応表。
# 画面/テーブルは基本設計書の章に統合したため、単体の画面仕様書/テーブル定義書は廃止。
- id: dt-requirement-spec
  name: requirement-spec
  title: 要件定義書
  output: 要件定義書.html
  template: requirement-spec.html.j2
  order: 1
  status: approved
  source:
    doc: contextdb/packs/jp-sier-std/documents/requirement-spec.yaml
    location: { section: 文書定義 }
    evidence: 要件定義書（Excel 風 HTML）— 機能/非機能要件を realizes のカバレッジ付きで列挙する台帳（非 abstract）

- id: dt-basic-design
  name: basic-design
  title: システム基本設計書（{system_name}）
  output: 基本設計書_{system_name}.html
  template: basic-design.html.j2
  abstract: true
  doc_no: { pattern: 'SD-[A-Z]{2,4}-\d{3}' }
  required_params: [system_name, doc_no, version, preface.purpose, preface.scope]
  order: 2
  status: approved
  source:
    doc: contextdb/packs/jp-sier-std/documents/basic-design.yaml
    location: { section: 文書定義 }
    evidence: システム基本設計書（Excel 風 HTML）— 概要・画面一覧・テーブル一覧・業務ルール・外部IFの章を持つ雛形（abstract）

- id: dt-detail-design
  name: detail-design
  title: 詳細設計書
  output: 詳細設計書.html
  template: detail-design.html.j2
  order: 3
  status: approved
  source:
    doc: contextdb/packs/jp-sier-std/documents/detail-design.yaml
    location: { section: 文書定義 }
    evidence: 詳細設計書（Excel 風 HTML）— モジュール（クラス）/メソッドを refines・realizes 付きで列挙する台帳（非 abstract）

- id: dt-test-spec
  name: test-spec
  title: テスト仕様書
  output: テスト仕様書.html
  template: test-spec.html.j2
  order: 4
  status: review
  source:
    doc: contextdb/packs/jp-sier-std/documents/test-spec.yaml
    location: { section: 文書定義 }
    evidence: テスト仕様書（Excel 風 HTML）— テストケースをレベル（単体/結合/総合）別に前提・手順・期待結果・verifies（→要件/メソッド/画面）付きで列挙し、検証カバレッジ・ギャップを集計する台帳（非 abstract）

- id: dt-test-result
  name: test-result
  title: テスト結果報告書
  output: テスト結果報告書.html
  template: test-result.html.j2
  order: 5
  status: review
  source:
    doc: contextdb/packs/jp-sier-std/documents/test-result.yaml
    location: { section: 文書定義 }
    evidence: テスト結果報告書（Excel 風 HTML）— test-run（executes→test-case）でテスト設計と実行結果を分離し、レベル別の実施サマリ・合格率、ケースごとの最新結果、verifies を辿った要件別合否を集計する台帳（非 abstract）

- id: dt-traceability-matrix
  name: traceability-matrix
  title: 要件・設計対応表
  output: 要件・設計対応表.html
  template: traceability-matrix.html.j2
  order: 6
  status: approved
  source:
    doc: contextdb/packs/jp-sier-std/documents/traceability-matrix.yaml
    location: { section: 文書定義 }
    evidence: 要件・設計対応表（Excel 風 HTML）— 要件→基本設計→詳細設計→メソッド→テストの対応（V字トレース）とカバレッジ・ギャップ・検証ギャップを一覧する台帳（非 abstract）

- id: dt-issue-register
  name: issue-register
  title: 課題一覧（{system_name}）
  output: 課題一覧_{system_name}.html
  template: issue-register.html.j2
  abstract: true
  doc_no: { pattern: 'IS-[A-Z]{2,4}-\d{3}' }
  required_params: [system_name, doc_no, version]
  order: 7
  status: review
  source:
    doc: contextdb/packs/jp-sier-std/documents/issue-register.yaml
    location: { section: 文書定義 }
    evidence: 課題一覧（Excel 風 HTML）— fact-reconcile が検出した層をまたぐ食い違い（contradictions）を open-issue／disputes で両論併記のまま台帳化する雛形（abstract）
