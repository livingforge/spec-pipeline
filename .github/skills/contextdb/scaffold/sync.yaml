# 同期チェック (sync_check.py) の設定 — 実装と正本の突合規則の雛形
#
# path_attributes: リポジトリパスを値に持つアイテム属性（ドリフト検出・実在検査に使う）
# inventory: リポジトリの実体を列挙し、対応アイテムの有無を突合する規則。
#   このサンプルデータ（データ項目・エンティティ・画面）はコードと 1:1 対応する
#   実体を持たないため規則は空。自プロジェクトに合わせて追記する。
#
#   value: 実体名の取り方 — parent | stem | yaml:<キー> | frontmatter:<キー> | lines
#   match: exact（完全一致）| contains（アイテム側の値が実体名を含めば一致）
#
# 例（スキルを src/skills/<名前>/ の frontmatter と突合する場合）:
#   inventory:
#     - type: skill
#       glob: "src/skills/*/frontmatter.common.yaml"
#       key: name
#       value: "yaml:name"
#       match: exact

version: 1

path_attributes: [path]

# 実在検査する「種別.属性」（例: ["module.path"]）。実行時に生まれる成果物のパスは書かない
check_exists: []

inventory: []
