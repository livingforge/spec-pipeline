# 文書定義: 会議室予約システム 基本設計書 — 標準パック jp-sier-std の abstract 文書
# basic-design を実体化する（from_standard）。様式・章立てはパックが持つので、
# 穴埋めした params だけを書く。要件定義書・詳細設計書・要件・設計対応表は非 abstract の
# 標準文書として contextdb generate で自動生成される。
from_standard: basic-design
system_name: 会議室予約
doc_no: SD-MRR-001
version: "1.0"
org: 総務部 業務システム課
preface:
  purpose: >-
    本書は会議室予約システムの画面・データベース・業務ルール・外部インターフェースの
    基本設計を定める。記載内容の正本は仕様データ（contextdb）であり、本書はそこから自動
    生成されたビューである。本書を直接編集せず、変更は正本データを直して再生成する。
  scope: >-
    対象は本社ビル 3〜8 階の会議室（全 24 室）の予約業務とする。空き状況照会・予約入力・
    予約一覧・予約詳細/変更・承認待ち一覧・利用実績の 6 画面、会議室・予約・利用者・承認の
    4 テーブル、およびそれらに関わる業務ルールと外部連携（社員マスタ連携・予約確定通知・
    館内サイネージ連携）を範囲とする。
  premise: >-
    社員情報は既存の社員マスタから日次で取り込み、本システムでは社員を新規登録しない。
    利用は社内ネットワークからに限り、社員番号と既存の認証基盤でログインする。データ項目の
    型・桁・値域の正本はデータ辞書であり、画面・テーブルの各表はデータ辞書から自動転記される。
