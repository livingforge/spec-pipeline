# 要件の正本（要件工程）— 機能要件 F-xx / 非機能要件 NFR-xx。
# F-01〜F-12 は screen / module から realizes される。NFR は設計要素未割当のため
# カバレッジ・ギャップ（warn）として可視化される（想定内）。

- id: req-f01
  req_id: F-01
  name: 空き状況照会
  kind: 機能
  statement: 利用者は日付・時間帯・階を指定して、予約可能な会議室の一覧を表示できる
  status: review
  source:
    doc: 01_業務要求メモ_docx_9038bb5b
- id: req-f02
  req_id: F-02
  name: 予約登録
  kind: 機能
  statement: 利用者は会議室・日時・利用人数・目的を入力して予約を登録できる
  status: review
  source:
    doc: 01_業務要求メモ_docx_9038bb5b
- id: req-f03
  req_id: F-03
  name: 予約変更
  kind: 機能
  statement: 利用者は自分が登録した予約の時間や人数を変更できる
  status: review
  source:
    doc: 01_業務要求メモ_docx_9038bb5b
- id: req-f04
  req_id: F-04
  name: 予約取消
  kind: 機能
  statement: 利用者は自分が登録した予約を取消できる
  status: review
  source:
    doc: 01_業務要求メモ_docx_9038bb5b
- id: req-f05
  req_id: F-05
  name: 予約一覧確認
  kind: 機能
  statement: 利用者は自分の予約、または会議室ごとの当日の予約を一覧で確認できる
  status: review
  source:
    doc: 01_業務要求メモ_docx_9038bb5b
- id: req-f06
  req_id: F-06
  name: 予約承認・確定
  kind: 機能
  statement: 一部の会議室（役員会議室など）の予約は、会議室管理者の承認があって初めて確定する
  status: review
  source:
    doc: 01_業務要求メモ_docx_9038bb5b
- id: req-f07
  req_id: F-07
  name: 利用実績集計
  kind: 機能
  statement: 会議室ごと・月ごとの予約件数と延べ利用時間を集計して表示できる
  status: review
  source:
    doc: 01_業務要求メモ_docx_9038bb5b
- id: req-f08
  req_id: F-08
  name: 空き状況照会からの予約遷移
  kind: 機能
  statement: 空き状況照会で「予約する」を押すと予約入力へ遷移し、選択した会議室・日時を引き継ぐ
  status: review
  source:
    doc: 02_画面一覧_項目_xlsx_29441a79
    location:
      sheet: 画面遷移
- id: req-f09
  req_id: F-09
  name: 予約登録後の一覧遷移
  kind: 機能
  statement: 予約入力で「登録」を押すと予約一覧へ遷移する（重複時はエラー表示で留まる）
  status: review
  source:
    doc: 02_画面一覧_項目_xlsx_29441a79
    location:
      sheet: 画面遷移
- id: req-f10
  req_id: F-10
  name: 予約一覧から詳細への遷移
  kind: 機能
  statement: 予約一覧で明細を選ぶと予約詳細・変更へ遷移する
  status: review
  source:
    doc: 02_画面一覧_項目_xlsx_29441a79
    location:
      sheet: 画面遷移
- id: req-f11
  req_id: F-11
  name: 予約詳細からの取消遷移
  kind: 機能
  statement: 予約詳細・変更で「取消」を押すと予約一覧へ遷移する
  status: review
  source:
    doc: 02_画面一覧_項目_xlsx_29441a79
    location:
      sheet: 画面遷移
- id: req-f12
  req_id: F-12
  name: 承認操作と予約確定
  kind: 機能
  statement: 承認待ち一覧で「承認」を押すと承認待ち一覧へ戻り、承認後に予約が確定する
  status: review
  source:
    doc: 02_画面一覧_項目_xlsx_29441a79
    location:
      sheet: 画面遷移
- id: req-nfr01
  req_id: NFR-01
  name: 空き状況照会の応答時間
  kind: 非機能
  statement: 空き状況照会の応答は通常時2秒以内であること
  status: review
  source:
    doc: 01_業務要求メモ_docx_9038bb5b
- id: req-nfr02
  req_id: NFR-02
  name: 同時利用者数
  kind: 非機能
  statement: 始業直後の混雑時に200名が同時に操作しても破綻しないこと
  status: review
  source:
    doc: 01_業務要求メモ_docx_9038bb5b
- id: req-nfr03
  req_id: NFR-03
  name: 稼働時間
  kind: 非機能
  statement: 平日7:00〜22:00は停止しないこと（計画停止を除く）
  status: review
  source:
    doc: 01_業務要求メモ_docx_9038bb5b
- id: req-nfr04
  req_id: NFR-04
  name: 利用環境・認証
  kind: 非機能
  statement: 社内ネットワークからのみ利用可能とし、社員番号と既存の認証基盤でログインする
  status: review
  source:
    doc: 01_業務要求メモ_docx_9038bb5b
- id: req-nfr05
  req_id: NFR-05
  name: 操作履歴の記録
  kind: 非機能
  statement: 予約の登録・変更・取消は、いつ・誰が行ったかを記録として残すこと
  status: review
  source:
    doc: 01_業務要求メモ_docx_9038bb5b
