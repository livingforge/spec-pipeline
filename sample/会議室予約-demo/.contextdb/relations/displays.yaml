# 画面 → データ項目「表示する」関係。SCR-02 は画面項目定義、他画面は画面の表示内容を接地。

- type: displays
  from: scr-02
  to: di-room-id
  note: 会議室はプルダウンで必須。空き状況照会で選んだ会議室を初期表示する。
  status: review
  source:
    doc: 02_画面一覧_項目_xlsx_29441a79
    location:
      sheet: 画面項目_予約入力
- type: displays
  from: scr-02
  to: di-use-date
  note: 利用日は日付で必須。当日以降のみ選択可、土日祝は選択不可。
  status: review
  source:
    doc: 02_画面一覧_項目_xlsx_29441a79
    location:
      sheet: 画面項目_予約入力
- type: displays
  from: scr-02
  to: di-start-time
  note: 開始時刻はプルダウンで必須。8:00〜20:30 を30分刻みで選択する。
  status: review
  source:
    doc: 02_画面一覧_項目_xlsx_29441a79
    location:
      sheet: 画面項目_予約入力
- type: displays
  from: scr-02
  to: di-end-time
  note: 終了時刻はプルダウンで必須。開始時刻より後で、開始からの差は最長4時間。
  status: review
  source:
    doc: 02_画面一覧_項目_xlsx_29441a79
    location:
      sheet: 画面項目_予約入力
- type: displays
  from: scr-02
  to: di-headcount
  note: 利用人数は数値で必須。1以上、会議室の定員以下。
  status: review
  source:
    doc: 02_画面一覧_項目_xlsx_29441a79
    location:
      sheet: 画面項目_予約入力
- type: displays
  from: scr-02
  to: di-purpose
  note: 利用目的はテキストで必須。全角40文字以内。
  status: review
  source:
    doc: 02_画面一覧_項目_xlsx_29441a79
    location:
      sheet: 画面項目_予約入力
- type: displays
  from: scr-02
  to: di-user-id
  note: 予約者は表示のみ。ログイン中の社員を自動表示する。
  status: review
  source:
    doc: 02_画面一覧_項目_xlsx_29441a79
    location:
      sheet: 画面項目_予約入力
- type: displays
  from: scr-02
