# ソースモジュール — 配布バンドルへ同梱される（または意図的に除外される）ソースの単位

- id: mod-skill-scripts
  status: approved
  name: docextract 起動スクリプト
  path: skill-src/docextract/scripts/
  description: run_docextract.py / run_docagent.py / _bootstrap.py。スキルの入口。

- id: mod-docextract
  status: approved
  name: docextract 本体パッケージ
  path: docextract/
  description: 抽出エンジン本体（extractors / ocr / manifest ほか）。単一のソース。
  source:
    doc: scripts/build_skill.py
    location: { symbol: PACKAGE_SRC }
    evidence: "本体 Python パッケージ (単一のソース)"

- id: mod-docagent
  status: approved
  name: docagent データ操作 API
  path: docagent/
  description: 集約 JSON のデータ操作 API。エージェント .md が `python -m docagent` を呼ぶ。
  source:
    doc: scripts/build_skill.py
    location: { symbol: DOCAGENT_SRC }
    evidence: "エージェント .md が `python -m docagent` を呼ぶため、配布先でも本体と一緒に手に入る必要がある。"

- id: mod-tests
  status: approved
  name: 単体テスト
  path: tests/
  description: バンドルに同梱し配布先でも自己検証できるようにする。
  source:
    doc: scripts/build_skill.py
    location: { symbol: TESTS_SRC }
    evidence: "単体テスト (バンドルに同梱し配布先でも自己検証できる)"

- id: mod-eval
  status: approved
  name: 評価ハーネス
  path: skill-src/docextract/scripts/eval/
  description: 抽出品質の評価用 QA 資産。開発時専用。

- id: mod-requirements
  status: approved
  name: requirements.txt
  path: requirements.txt
  description: 実行時依存の宣言。

- id: mod-requirements-lock
  status: approved
  name: requirements.lock
  path: requirements.lock
  description: ハッシュ固定ロック。存在する場合のみ同梱される。

- id: mod-specdb-engine
  status: approved
  name: specdb エンジン
  path: specdb/ (engine.py, generate.py, diff.py)
  description: 種別非依存の検証・生成・差分ツール。

- id: mod-specdb-tests
  status: approved
  name: specdb テスト
  path: specdb/tests/
  description: エンジンの同梱テスト。

- id: mod-specdb-scaffold
  status: approved
  name: specdb 雛形データ
  path: specdb/
  description: metamodel.yaml / items / templates 等。利用者がプロジェクトへコピーして育てる。

- id: mod-specdb-requirements
  status: approved
  name: specdb requirements.txt
  path: skill-src/specdb/requirements.txt
  description: PyYAML + Jinja2 のみ。
