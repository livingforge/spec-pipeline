# ビルド規則 — build_skill.py に埋め込まれた変換・構成の設計判断

- id: rule-md-assembly
  status: approved
  statement: >-
    SKILL.md / エージェント .md は body.md + frontmatter.common.yaml +
    frontmatter.<platform>.yaml を結合して生成する。4 ファイルは必須で、
    欠けているとビルドは開始前に exit 1 で失敗する。
  source:
    doc: scripts/build_skill.py
    location: { symbol: "_assemble_md / main の required 検査" }
    evidence: "SKILL.md / agents/*.md は共通 body とプラットフォーム別フロントマターから組み立てる。"

- id: rule-agent-layout
  status: approved
  statement: >-
    エージェント .md の拡張子と配置はプラットフォームごとに変える:
    .github はフラットに <名前>.agent.md、.claude は agents/<名前>/<名前>.md。
  source:
    doc: scripts/build_skill.py
    location: { symbol: "AGENT_SUFFIXES / AGENT_NESTED" }
    evidence: "GitHub はフラット + .agent.md 拡張子、.claude はネスト + 素の .md。"

- id: rule-include-resolution
  status: approved
  statement: >-
    body.md 内の {{include:<相対パス>}} は src ルート基準で解決して差し込む。
    複数エージェントで共有する文面は _shared/ で一元管理しドリフトを防ぐ。
    include 先が無ければビルドは失敗する。
  source:
    doc: scripts/build_skill.py
    location: { symbol: _resolve_includes }
    evidence: "分類・要約基準のように複数エージェントで共有する文面を一箇所 (_shared/) で管理し、ドリフトを防ぐ。"

- id: rule-skill-dir-subst
  status: approved
  statement: >-
    {{skill_dir}} プレースホルダは <root>/skills/<スキル名> に展開する。
    body だけでなく docs/ 内の Markdown にも適用し、コマンド例が cwd 非依存の
    具体パスでスキル同梱スクリプトを指せるようにする。
  source:
    doc: scripts/build_skill.py
    location: { symbol: "_substitute_placeholders / build_skill" }
    evidence: "コマンド例が cwd に依存する python -m ではなくスキル同梱の起動スクリプトを具体パスで指せるようにする。"

- id: rule-pycache-excl
  status: approved
  statement: >-
    __pycache__ / *.pyc はいかなるコピーにも同梱しない。zip 化の際も除外する。
  source:
    doc: scripts/build_skill.py
    location: { symbol: "_copytree / build_zip" }
    evidence: 'ignore=shutil.ignore_patterns("__pycache__", "*.pyc", ...)'

- id: rule-lock-preferred
  status: approved
  statement: >-
    requirements.lock（ハッシュ固定）が存在すれば同梱し、bootstrap はこちらを
    優先して決定論的にインストールする（再現性・改竄検知）。
  source:
    doc: scripts/build_skill.py
    location: { symbol: REQUIREMENTS_LOCK_SRC }
    evidence: "ハッシュ固定のロックファイル (再現性・改竄検知)。存在すれば同梱し、bootstrap がこちらを優先して決定論的にインストールする。"

- id: rule-zip
  status: approved
  statement: >-
    配布 zip (dist/docextract-skill.zip) は .claude/ と .github/ の両ツリー全体に
    加え、配布物設計データ .specdb/（生成ビュー out/ を除く）をリポジトリ相対パス
    のまま収録する（--no-zip でスキップ可能）。配布物は自身の設計仕様を持ち歩く。
  source:
    doc: scripts/build_skill.py
    location: { symbol: build_zip }
    evidence: "dist/docextract-skill.zip <- 上記 .claude/ + .github/ に加え、配布物設計データ .specdb/ (out/ を除く) を収録。"
