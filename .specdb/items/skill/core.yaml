# スキル — Claude Code / GitHub Copilot に配布されるエージェントスキル

- id: sk-docextract
  name: docextract
  purpose: >-
    Office 文書 (Word / Excel / PowerPoint) と PDF を解析し、テキスト・表・画像を
    抽出して出典付きの構造化 JSON として出力する文書抽出スキル。
  runtime: Python 3.10+（共有仮想環境 .venv、起動スクリプト経由で自動セットアップ）
  status: approved
  rules: [dr-01, dr-05]
  source:
    doc: README.md
    location: {section: 冒頭}
    evidence: >-
      Office 文書 (Word / Excel / PowerPoint) と PDF を解析し、テキスト・表・画像を抽出して JSON 形式で出力します。

- id: sk-specdb
  name: specdb
  purpose: >-
    仕様アイテムと関係を YAML のデータ（正本）として保存し、設計書はそこから
    生成されるビューにする仕様データ管理スキル。メタモデル駆動で機械検証・
    文書生成・ベースライン差分・グラフ可視化を提供する。
  runtime: Python 3.10+（依存は PyYAML + Jinja2 のみ）
  status: approved
  rules: [dr-01, dr-03, dr-05, dr-06]
  source:
    doc: specdb/README.md
    location: { section: "冒頭" }
    evidence: "「文書を保存する」のではなく「仕様アイテムと関係をデータ（正本）として保存し、設計書はそこから生成されるビューにする」構想の実証。"

- id: sk-spec-sync
  name: spec-sync
  purpose: >-
    実装の変更を .specdb（設計データの正本）へ同期する手順スキル。同期候補の列挙は sync_check.py、正本の更新は mutate.py の plan 適用で機械化し、人と LLM の判断は「仕様の変化か」の判定と文章化だけに絞る。機械検証 error 0 → ビュー再生成 → レビュー待ちの報告（history.py --uncommitted）までを定型化し、実装と設計データの乖離を防ぐ。
  runtime: 手順のみ（specdb スキル同梱のツールを利用）
  status: approved
  rules: [dr-01, dr-06]
  source:
    doc: .claude/skills/spec-sync/SKILL.md
    location: {section: 冒頭}
    evidence: >-
      手順は可能な限り機械化されている。判断が要るのは「この実装変更は仕様の変化か」の判定と、説明文・出典の文章化だけで、候補の列挙は sync_check.py、YAML の追記・状態変更は mutate.py が行う。

- id: sk-docsummary
  name: docsummary
  purpose: >-
    抽出・索引化済みの文書を LLM（openai / azure / gemini / anthropic）で要約するスキル。要約はパース済み文書情報に付加する固定構造（メタ表＋カテゴリー＋本文）で保存されるため、利用者が定義するのは出力フォーマットではなく「要約の観点」（summary_guide.md）と「カテゴリー」（summary_categories.json の統制語彙。LLM が付与し正規化）である。内容ハッシュと要約仕様ハッシュ（観点＋カテゴリー）で鮮度（未要約／陳腐化／最新）を追跡する。API キーは .env（既定）または環境変数で管理し、値を表示・保存しない。
  runtime: >-
    Python 3.10+（追加依存なし。標準ライブラリのみで各社 REST API を呼ぶ）。実行体（docsummary パッケージ）は本スキルの scripts に同梱し、依存する docextract / docagent パッケージは同梱せず同一プロジェクトの兄弟スキル docextract を実行時参照で解決する。共有 venv・依存インストールのマーカーは docextract と共用する。
  status: review
  source:
    doc: src/skills/docsummary/body.md
    location: {section: 冒頭}
    evidence: '**パース済み文書情報に付加する固定構造**（メタ表 + カテゴリー + 本文）で'

- id: sk-spec-reconcile
  name: spec-reconcile
  purpose: >-
    抽出ファクト（facts.json）を意味的に名寄せし、specdb アイテム化の前に一貫性を整える提案スキル。決定的なブロッキング（LLM 不要）で同一かもしれないファクトを束ね、LLM が同一概念のグループ化・矛盾検出・用語統一を出典付きで裁定して reconcile.json を出力する。承認済み概念は specdb mutate plan（add-item・status review）へ決定的に変換し、適用と承認は既存の specdb ツールと人のレビューに委ねる。specdb の構造的検証が捉えない意味的一貫性を補い、文書を順に渡しても結果が揺れないようにする。
  runtime: >-
    Python 3.10+（追加依存なし。標準ライブラリのみで各社 REST API を呼ぶ）。実行体（specreconcile パッケージ）は本スキルの scripts に同梱し、依存する docextract / docagent / docsummary パッケージと requirements は同梱せず同一プロジェクトの兄弟スキル（docextract / docsummary）を実行時参照で解決する。plan サブコマンドの PyYAML は specdb スキルが同じ共有 venv に用意する。
  status: review
  source:
    doc: src/skills/spec-reconcile/body.md
    location: {section: 冒頭}
    evidence: 抽出ファクトを意味的に名寄せする
