# スキル — 配布される 2 スキルと、その同梱物・除外物・従う規則

- id: skill-docextract
  status: approved
  name: docextract
  src_dir: skill-src/docextract
  source:
    doc: scripts/build_skill.py
    location: { symbol: build_skill }
  bundles:
    - module: mod-skill-scripts
      dest: scripts
      exclude: eval
      note: 起動スクリプト一式。eval/ は除外して展開する。
    - module: mod-docextract
      dest: scripts/docextract
    - module: mod-docagent
      dest: scripts/docagent
    - module: mod-tests
      dest: scripts/tests
      note: >-
        テスト側の sys.path ブートストラップは「親 = docextract パッケージのある場所」
        前提で、リポジトリとバンドルの両方で成立する。
    - module: mod-requirements
      dest: scripts/requirements.txt
    - module: mod-requirements-lock
      dest: scripts/requirements.lock
      note: 存在する場合のみ同梱（rule-lock-preferred）。
  excludes:
    - module: mod-eval
      reason: >-
        開発時専用の QA 資産のため配布バンドルには同梱しない。同梱テスト test_eval は
        eval 未検出時に自動 skip するのでバンドル側テストは壊れない。
      source:
        doc: scripts/build_skill.py
        location: { symbol: build_skill }
        evidence: "eval/ (評価ハーネス) は開発時専用の QA 資産のため配布バンドルには同梱しない。"
  rules:
    - rule-md-assembly
    - rule-skill-dir-subst
    - rule-pycache-excl
    - rule-lock-preferred

- id: skill-specdb
  status: approved
  name: specdb
  src_dir: skill-src/specdb
  source:
    doc: scripts/build_skill.py
    location: { symbol: build_specdb_skill }
    evidence: "ツール (scripts/) と雛形データ (scaffold/) を分けて同梱する。"
  bundles:
    - module: mod-specdb-engine
      dest: scripts
      note: engine.py / generate.py / diff.py の 3 ファイルを個別コピー。
    - module: mod-specdb-tests
      dest: scripts/tests
    - module: mod-specdb-requirements
      dest: scripts/requirements.txt
    - module: mod-specdb-scaffold
      dest: scaffold
      exclude: "*.py, tests, out"
      note: ツール・テスト・生成物を除いた雛形データのみ。利用者がコピーして育てる。
  rules:
    - rule-md-assembly
    - rule-skill-dir-subst
    - rule-pycache-excl
