# 機能 — 利用者から見た機能の一覧（機能一覧表の正本）

- id: fn-extract
  func_id: F-01
  name: 文書抽出
  category: 文書抽出
  description: >-
    Word / Excel / PowerPoint / PDF からテキスト・表・画像を抽出し、
    形式ごとの位置情報（出現順・シート・スライド・ページ/座標）付きの
    JSON として出力する。
  status: approved
  source:
    doc: README.md
    location: { section: "対応形式" }
    evidence: "Word .docx 段落 (スタイル名付き)・表・インライン画像 — 文書内の出現順"

- id: fn-id
  func_id: F-02
  name: 衝突しない文書 ID の採番
  category: 文書抽出
  description: >-
    入力ファイルの正規化済み絶対パスのハッシュを含む ID を採番する。
    別フォルダの同名ファイルでも衝突せず、内容ハッシュで重複・改変も検知できる。
    以降の全工程がこの ID をそのまま使う（再計算しない）。
  status: approved
  source:
    doc: README.md
    location: { section: "使い方 > CLI" }
    evidence: "<id> は入力ファイルの正規化済み絶対パスのハッシュを含むため、別フォルダの同名ファイルでも衝突しません"

- id: fn-ocr
  func_id: F-03
  name: 画像内テキストの OCR
  category: 文書抽出
  description: >-
    スクリーンショット等として貼り付けられた画像内のテキストを OCR で読み取り、
    画像要素の ocr_text に付加する。バックエンドは RapidOCR / Windows OCR を
    自動選択できる。
  status: approved
  source:
    doc: README.md
    location: { section: "画像内テキストの OCR" }
    evidence: "既定で各画像に OCR を実行し、読み取れたテキストを画像要素の ocr_text に付加します。"

- id: fn-imgtable
  func_id: F-04
  name: 画像内の表の構造復元
  category: 文書抽出
  description: >-
    画像として貼られた表をレイアウト解析 (rapid_layout) で検出し、表構造復元
    (rapid_table) で行・列を復元して、通常の table 要素として出力する。
    元画像への参照が location に残る。
  status: approved
  source:
    doc: README.md
    location: { section: "画像内の表検出 (OSS)" }
    evidence: "画像として貼られた表を検出し、行・列構造を復元して通常の table 要素として出力します。"

- id: fn-batch
  func_id: F-05
  name: フォルダ一括抽出・索引化
  category: 資料活用
  description: >-
    フォルダ（再帰可）内の対応ファイルを一括抽出し、抽出マニフェストの全文書を
    集約ストアの文書索引へ一括登録・更新する。
  status: approved
  source:
    doc: docagent/README.md
    location: { section: "現状把握（doc-indexer）" }
    evidence: "python -m docagent sync # 抽出マニフェストの全文書を一括登録/更新"

- id: fn-doctype
  func_id: F-06
  name: 文書種別の付与
  category: 資料活用
  description: >-
    各資料に「要件定義・基本設計・議事録」等の文書種別を 1 つ付与する。
    種別の定義はコードにハードコードせず、既定 JSON + ストア側の上書きの
    2 段構えで管理する。
  status: approved
  source:
    doc: docagent/README.md
    location: { section: "文書種別（doctype）" }
    evidence: "定義は 2 段構え（コードにハードコードしない）"

- id: fn-search
  func_id: F-07
  name: 本文の横断検索
  category: 資料活用
  description: >-
    登録済み文書の本文を横断検索し、出典 (doc_id + location) と抜粋を返す。
    doc-qa の回答の接地（グラウンディング）に使う。
  status: approved
  source:
    doc: docagent/README.md
    location: { section: "横断検索（doc-qa）" }
    evidence: "python -m docagent search \"権限\" --json # 本文を横断検索し doc_id + location + 抜粋を返す"

- id: fn-facts
  func_id: F-08
  name: 仕様ファクトの管理
  category: 資料活用
  description: >-
    文書から洗い出した機能要件・業務ルール・データ項目等を、出典付きファクト
    (doc_id + location + evidence) として蓄積・一覧・出力する。
  status: approved
  source:
    doc: docagent/README.md
    location: { section: "仕様ファクト JSON の構造" }
    evidence: "spec-extractor が保存する、出典付きの仕様/要件項目。"

- id: fn-validate
  func_id: F-09
  name: 仕様データの機械検証
  category: 仕様管理
  description: >-
    ID 一意性・必須属性・enum・多重度 (cardinality)・一意性 (unique)・
    未定義参照・孤児を検証する。error が 1 件でもあれば設計書生成を中止し
    exit 1 を返す（CI で PR をブロックできる）。
  status: approved
  source:
    doc: specdb/README.md
    location: { section: "エンジンが行う汎用検証" }
    evidence: "error が 1 件でもあれば生成は中止され exit 1（CI で PR をブロックできる）。"

- id: fn-generate
  func_id: F-10
  name: 設計書の自動生成
  category: 仕様管理
  description: >-
    文書定義 (documents/) と Jinja2 テンプレートから、検証済み仕様データを Markdown / Excel 風 HTML の設計書として生成する。文書種別の追加にコード改修は不要。foreach 宣言で 1 種別のアイテムごとに 1 ファイルを出力でき、出力先の副ディレクトリも自動作成する。
  status: review
  source:
    doc: specdb/README.md
    location: { section: "文書種別の追加方法（コード改修なし）" }
    evidence: "documents/<名前>.yaml を書く（title / output / template の 3 行）"

- id: fn-diff
  func_id: F-11
  name: ベースライン差分
  category: 仕様管理
  description: >-
    Git タグをベースラインとして、2 リビジョン間の仕様データ差分
    （変更点一覧）レポートを出力する。
  status: approved
  source:
    doc: specdb/README.md
    location: { section: "使い方" }
    evidence: "git tag baseline/R1.0 で作成し、python specdb/diff.py baseline/R1.0 で「ベースラインからの変更点一覧」が出る。"

- id: fn-visualize
  func_id: F-12
  name: 関係グラフの可視化
  category: 仕様管理
  description: >-
    仕様データ全体を自己完結の対話型 HTML（依存・CDN なし）に描画する。
    種別で色分けした関係グラフ・種別/関係/状態フィルタ・検索・ノード詳細・
    検証結果のオーバーレイ・一覧テーブル表示を持つ。レビュー中（status: review）の
    アイテム・関係は破線で強調され、レビュー対象とその隣接だけの関係グラフに
    絞り込める。
  status: approved
  source:
    doc: .claude/skills/specdb/SKILL.md
    location: { section: "冒頭" }
    evidence: "visualize.py が仕様データ全体を自己完結の対話型 HTML（依存・CDN なし）に描画する"

- id: fn-author
  func_id: F-14
  name: 仕様の正本化・設計書生成
  category: 仕様管理
  description: >-
    仕様ファクトや資料・指示から metamodel.yaml と items/・relations/ を設計・
    整備し（出典を引き継ぐ）、検証を通したうえで文書定義・テンプレートを設計して
    設計書を生成する。エージェントが担い、設計書は手書きしない。
  status: approved
  source:
    doc: src/agents/spec-designer/body.md
    location: { section: "冒頭" }
    evidence: "設計書を手書きしません —— 正本はデータ、設計書はそこから生成されるビューです。"

- id: fn-history
  func_id: F-16
  name: 変更履歴の生成
  category: 仕様管理
  description: >-
    仕様データを触った各コミットを Git 履歴から拾い、直前状態との差分を
    「アイテム・関係の追加/削除/変更」のレベルで再構成して時系列の変更履歴を
    作る。アイテム単位の変遷（--id）と機械可読出力（--json）を持ち、
    生成設計書の改訂履歴シートはこの実履歴から自動で埋まる。
  status: approved
  source:
    doc: specdb/history.py
    location: { section: "冒頭 docstring" }
    evidence: "仕様データ (metamodel.yaml / items/ / relations/) を触った各コミットについて、直前の状態との差分を「アイテム・関係の追加/削除/変更」のレベルで復元する。"

- id: fn-spec-sync
  func_id: F-15
  name: 実装と設計データの同期
  category: 仕様管理
  description: >-
    機能の追加・変更・廃止のあとに、実装差分を .specdb の語彙（アイテム・関係）へ写像して正本を更新する。同期候補の列挙（sync_check.py）と正本の更新（mutate.py の plan 適用）を機械化し、新規・変更は status: review で登録、機械検証 error 0 とビュー再生成までを完了の定義（CLAUDE.md）とする。
  status: approved
  source:
    doc: CLAUDE.md
    location: { section: "完了の定義（Definition of Done）" }
    evidence: ".specdb（プロジェクト設計データの正本）を更新済み — 手順は /spec-sync スキルに従う"

- id: fn-build
  func_id: F-13
  name: スキルビルド・配布
  category: 配布
  description: >-
    単一ソースから .claude/ と .github/ の両方へ同一内容を展開し、展開先
    リポジトリのルートに解凍するだけで導入できる配布物 zip を作成する。
  status: approved
  source:
    doc: README.md
    location: { section: "スキルとしての配布" }
    evidence: "dist/docextract-skill.zip 上記をまとめた配布物 (展開先リポジトリのルートに解凍するだけで導入完了)"

- id: fn-sync-check
  func_id: F-17
  name: 同期チェック（実装と正本の乖離検出）
  description: >-
    実装と仕様データ（正本）の乖離を機械的に検出し、spec-sync の同期候補を列挙する。変更ファイルを参照するアイテム/関係の逆引き（ドリフト）、sync.yaml の規則によるリポジトリ実体との棚卸し（未登録・実体なし）、出典の鮮度検査（doc の実在・evidence の照合）から成り、--strict で CI ゲートにできる。
  category: 仕様管理
  status: approved
  source:
    doc: specdb/sync_check.py
    location: {section: docstring}
    evidence: 同期チェック — 実装と仕様データ（正本）の乖離を機械的に検出する

- id: fn-mutate
  func_id: F-18
  name: 正本の変更操作（採番・規約の強制）
  description: >-
    仕様データへの追記・状態変更を機械的に行う。ID の接頭辞と採番・連番属性（metamodel の id_prefix / sequence 宣言）の自動化、status: review での登録、source（出典）必須、approved は approve 操作のみ、という規約をツールで強制する。操作リスト（plan.json）の一括適用に対応し、適用後の再検証で新たな error が生まれたら自動で巻き戻す。
  category: 仕様管理
  status: approved
  source:
    doc: specdb/mutate.py
    location: {section: docstring}
    evidence: 変更操作 CLI — 仕様データ（正本）への追記・状態変更を機械的に行う

- id: fn-cli-dispatch
  func_id: F-19
  name: 統一エントリポイント（スキル CLI）
  description: >-
    スキルのスクリプト操作を venv コマンド specdb / docextract / docsummary に統一する。共有 venv へは探索係パッケージ skill-launcher（scripts/launcher/、_bootstrap.py が install）が console script を登録し、任意のディレクトリから <スキル名> <サブコマンド> [オプション] で起動できる。コマンドは cwd から上方探索して展開済みスキル（スキル直下の転送ファイルと scripts/__main__.py のディスパッチャ。build_skill.py が生成）へ委譲するだけで、スキル本体は install しないため zip 再展開の更新に追従する。specdb は --root 未指定時にプロジェクトの .specdb を自動補完し、docsummary は独立スキル docsummary へ委譲される（実行時に兄弟スキル docextract の docextract / docagent パッケージを参照する）。__init__.py を持つ同名の通常 Python パッケージは誤解決しない。venv 準備前のフォールバックとして python <スキルディレクトリ> <サブコマンド> と従来の python <ディレクトリ>/scripts/<ツール>.py も使える。
  category: 配布
  status: review
  source:
    doc: src/skills/docextract/scripts/launcher/skill_launcher.py
    location: {section: docstring}
    evidence: >-
      venv コマンド `specdb` / `docextract` / `docsummary` の実体 — cwd から上方探索して委譲する

- id: fn-env-setup
  func_id: F-20
  name: 実行環境の構築（セットアップ）
  description: >-
    スキル実行に必要な共有環境を一括構築する。共有 venv の作成（uv。必要なら Python 本体も調達）、docextract / specdb 両スキルの依存インストール（requirements.lock 優先・marker による冪等化）、venv コマンド specdb / docextract / docsummary の install を setup サブコマンド（setup_env.py）が行い、--check は無変更・承認不要の状態確認を提供する（LLM 接続設定 .env の有無も情報として表示するが、値は読まない）。高リスク操作は _bootstrap の承認ゲート（opt-in・fail-closed）を必ず通る。従来どおり extract / docagent の初回実行でも同じ bootstrap が走る（フォールバック）。
  category: 配布
  status: review
  source:
    doc: src/skills/docextract/scripts/setup_env.py
    location: {section: docstring}
    evidence: スキル実行環境の構築 — 共有 venv・依存・venv コマンドを一括で用意する

- id: fn-list
  func_id: F-21
  name: アイテム/関係の一覧（status 絞り込み）
  description: >-
    アイテムと関係を status・種別で絞って列挙する読み取り専用ツール。正本の YAML は書き換えず engine の Store をそのまま読む。ref を mutate の参照形式（アイテムは id、関係は 型:from->to）で出すため、--json 出力の各 ref を plan.json の approve 操作へそのまま渡せる。承認（mutate approve / plan の apply）の前段で対象を機械的に列挙する用途に用いる。
  category: 仕様管理
  status: approved
  source:
    doc: specdb/list.py
    location: {section: docstring}
    evidence: 一覧 — アイテム/関係を status などで絞って列挙する（読み取り専用）

- id: fn-summarize
  func_id: F-22
  name: 文書要約（LLM）
  description: >-
    登録済み文書（library.json）を LLM で要約する。対象は文書 ID・元ファイルのフォルダ（--dir）・未要約/陳腐化のみ（--pending）・全登録文書（--all）で選択でき、既定では内容ハッシュと要約仕様ハッシュ（観点＋カテゴリー）による鮮度判定で fresh をスキップする（--force で再要約）。出力構造はツールが固定し（メタ表＋カテゴリー行＋本文）、可変なのは観点に沿った本文と、統制語彙から付与するカテゴリー（LLM が 1 つ選び docextract の doctype と同じ仕組みで正規化。語彙外・欠落は未分類）だけ。本文は result.json の軽量テキストビューを上限文字数まで渡す（超過分は要約に明記させる）。結果は summaries/<doc_id>.md と要約索引（summaries.json、category を含む）へ 1 件ごとに保存し、途中失敗でも完了分を失わない。--dry-run は API キー不要で対象一覧のみ返し、429/5xx は 1 回だけ自動再試行する。
  category: 資料活用
  status: review
  source:
    doc: docsummary/cli.py
    location: {section: docstring}
    evidence: 'run     文書を LLM で要約する (対象: ID / --dir / --pending / --all)'

- id: fn-llm-config
  func_id: F-23
  name: LLM 接続設定（.env 管理）
  description: >-
    要約に使う LLM の接続情報（API キー・エンドポイント・モデル）を .env（既定。cwd から上方探索）または環境変数で管理する。config --check は各プロバイダの必須変数の設定有無と由来（環境変数 / .env）だけを表示してキーの値は一切出力せず、config --init は空プレースホルダのみの .env / .env.example 雛形を作成する。プロバイダは --provider > 環境変数 DOCSUMMARY_PROVIDER > 「設定済みがちょうど 1 つならそれ」の順で決まり、決められないときは次の一手つきで拒否する。エージェントは .env を直接読まず、この確認コマンドの結果だけで状態を判断する。
  category: 配布
  status: review
  source:
    doc: docsummary/settings.py
    location: {section: docstring}
    evidence: 秘密情報 (API キー等) は **環境変数または `.env` ファイル**で受け取る。

- id: fn-standard-pack
  func_id: F-24
  name: 標準パック継承（様式の横断標準化）
  description: >-
    metamodel.yaml の extends 宣言で標準パック（様式・文書カタログ・メタモデルのバージョン付き配布単位）を継承する。パック自身も extends でき「全社→事業部→プロジェクト」の単一親チェーンを構成する。実効メタモデルはチェーンをルートから重ねたマージ結果になり、engine はそれでデータを検証する。各層は下位をマージした結果に対し緩和禁止に従い準拠は推移的である。conform が L1（メタモデル）+ L2（必須文書・記載必須・ベースライン前提）+ pack.lock 照合を総合判定し、pack lock がチェーンの版・内容ハッシュを固定する。パック開発側では pack check（block 規約のリリースチェック）、pack build（正本 specdb からの配布物生成による自己正本化）、pack migrate（改版時の移行プラン適用）を提供する。
  category: 仕様管理
  status: review
  source:
    doc: specdb/README.md
    location: {section: 標準パック（プロジェクト横断の様式標準化 — Phase 1）}
    evidence: 設計書様式・文書カタログ・メタモデルをプロジェクト間で統一するための仕組み

- id: fn-aggregate
  func_id: F-25
  name: プロジェクト横断集計
  description: >-
    標準パックを共有する複数プロジェクトの仕様データを横串で集計し、種別ごとの共通台帳（共通データ項目辞書・システム間IF台帳）と拡張列挙の全社集計を Markdown で出力する。同名アイテムの属性ゆらぎを要確認として指摘し、extensible enum の標準宣言に無い値は「その他」に丸めて元値の内訳を次期標準への昇格候補として掲出する。
  category: 仕様管理
  status: review
  source:
    doc: specdb/README.md
    location: {section: 横断集計とパックのリリースチェック}
    evidence: aggregate は標準パックを共有する複数プロジェクトを横串で読み
