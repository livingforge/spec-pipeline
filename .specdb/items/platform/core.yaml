# 展開先プラットフォーム — build_skill.py の PLATFORM_ROOTS / PLATFORM_KEYS /
# AGENT_SUFFIXES / AGENT_NESTED をデータ化したもの

- id: plat-claude
  status: approved
  name: claude
  root_dir: .claude
  agent_suffix: .md
  agent_layout: nested   # agents/<名前>/<名前>.md
  description: Claude Code 向け。エージェントはサブディレクトリにネストして置く。
  source:
    doc: scripts/build_skill.py
    location: { symbol: AGENT_NESTED }
    evidence: ".claude はエージェントごとにサブディレクトリを作り agents/<名前>/<名前>.md に置く。"

- id: plat-github
  status: approved
  name: github
  root_dir: .github
  agent_suffix: .agent.md
  agent_layout: flat     # agents/<名前>.agent.md
  description: GitHub Copilot 向け。エージェント定義は `*.agent.md` として認識される。
  source:
    doc: scripts/build_skill.py
    location: { symbol: AGENT_SUFFIXES }
    evidence: "GitHub Copilot はエージェント定義を `*.agent.md` として認識するため、.github だけ拡張子を変える。"
