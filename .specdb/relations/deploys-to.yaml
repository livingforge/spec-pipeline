# 展開関係 — 各配布単位がどのプラットフォームのどのパスへ展開されるか。
# out_path はプロジェクトルートからの生成先。同じ配布単位内で重複禁止 (unique)。

# --- スキル ---
- type: deploys-to
  from: skill-docextract
  to: plat-claude
  out_path: .claude/skills/docextract
  status: approved
- type: deploys-to
  from: skill-docextract
  to: plat-github
  out_path: .github/skills/docextract
  status: approved

- type: deploys-to
  from: skill-specdb
  to: plat-claude
  out_path: .claude/skills/specdb
  status: approved
- type: deploys-to
  from: skill-specdb
  to: plat-github
  out_path: .github/skills/specdb
  status: approved

# --- エージェント (レイアウトは rule-agent-layout に従う) ---
